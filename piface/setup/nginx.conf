# =============================================================================
# PiFace Attendance System - Nginx Configuration
# =============================================================================

# --- Upstream: FastAPI via Unix socket ---
upstream piface_api {
    server unix:/run/piface/web.sock;
}

# --- HTTP -> HTTPS redirect ---
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 192.168.4.1;

    # Captive portal detection endpoints (must respond on HTTP)
    # Android
    location /generate_204 {
        return 302 https://192.168.4.1/;
    }

    # Apple
    location /hotspot-detect.html {
        return 302 https://192.168.4.1/;
    }

    # Windows
    location /connecttest.txt {
        return 302 https://192.168.4.1/;
    }

    # Firefox
    location /success.txt {
        return 302 https://192.168.4.1/;
    }

    # Everything else -> HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS server ---
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name 192.168.4.1;

    # TLS
    ssl_certificate     /opt/piface/certs/piface.crt;
    ssl_certificate_key /opt/piface/certs/piface.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:2m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options        "DENY"    always;
    add_header X-Content-Type-Options "nosniff" always;

    # Body size (allow photo uploads)
    client_max_body_size 50m;

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 256;

    # Custom error page
    error_page 502 /502.html;
    location = /502.html {
        root /opt/piface/frontend/dist;
        internal;
    }

    # ---- Captive portal endpoints (HTTPS) ----
    location /generate_204 {
        return 204;
    }

    location /hotspot-detect.html {
        return 200 '<HTML><HEAD><TITLE>Success</TITLE></HEAD><BODY>Success</BODY></HTML>';
        add_header Content-Type text/html;
    }

    location /connecttest.txt {
        return 200 'Microsoft Connect Test';
        add_header Content-Type text/plain;
    }

    location /success.txt {
        return 200 'success';
        add_header Content-Type text/plain;
    }

    # ---- API proxy ----
    location /api/ {
        proxy_pass         http://piface_api;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout  30s;
        proxy_connect_timeout 5s;
        proxy_send_timeout  30s;
    }

    # SSE / streaming endpoints - disable buffering
    location /api/stream/ {
        proxy_pass         http://piface_api;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 5s;
    }

    location /api/attendance/live {
        proxy_pass         http://piface_api;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 5s;
    }

    # ---- Static frontend (React) ----
    location / {
        root /opt/piface/frontend/dist;
        try_files $uri $uri/ /index.html;

        # Never cache index.html (so updates propagate immediately)
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # Cache hashed static assets aggressively (1 year)
        location ~* \.[0-9a-f]{8,}\.(js|css|woff2?|png|jpg|svg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }
}
