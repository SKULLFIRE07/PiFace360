/var/log/piface/*.log {
    daily
    rotate 7
    copytruncate
    compress
    delaycompress
    maxsize 10M
    missingok
    notifempty
    create 0640 piface piface
    sharedscripts
    postrotate
        systemctl kill -s USR1 piface-engine.service 2>/dev/null || true
        systemctl kill -s USR1 piface-web.service 2>/dev/null || true
    endscript
}
